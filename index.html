<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>KPSTI AR with Video</title>

  <!-- A-Frame -->
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <!-- MindAR -->
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      width: 100%;
      height: 100%;
    }
    a-scene {
      width: 100%;
      height: 100%;
      position: fixed;
    }
  </style>
</head>

<body>

<a-scene
  mindar-image="imageTargetSrc: targets/targets.mind;"
  vr-mode-ui="enabled: false"
  device-orientation-permission-ui="enabled: false">

  <!-- ASSETS -->
  <a-assets>
    <!-- 3D MODEL -->
    <a-asset-item id="model" src="models/model.glb"></a-asset-item>

    <!-- YOUR VIDEO FILE -->
    <video id="video" 
           src="videos/video.mp4" 
           preload="auto" 
           crossorigin="anonymous" 
           playsinline 
           webkit-playsinline 
           muted>
    </video>
  </a-assets>

  <!-- CAMERA -->
  <a-camera position="0 0 0" look-controls="enabled: false">
    <a-cursor raycaster="objects: .clickable" fuse="false"></a-cursor>
  </a-camera>

  <!-- MARKER -->
  <a-entity mindar-image-target="targetIndex: 0">

    <!-- 3D MODEL -->
    <a-gltf-model 
      src="#model"
      position="0 0 -0.5"
      scale="0.5 0.5 0.5"
      animation="property: rotation; to: 0 360 0; loop: true; dur: 8000">
    </a-gltf-model>

    <!-- VIDEO PLANE (HIDDEN) -->
    <a-video 
      id="videoPlane"
      src="#video"
      position="0 0 -0.5"
      width="1"
      height="0.6"
      visible="false">
    </a-video>

    <!-- BUTTON TO PLAY VIDEO -->
    <a-plane 
      id="playButton"
      class="clickable"
      color="blue"
      position="0 -0.4 0"
      width="1"
      height="0.4"
      text="value: Play Video; align: center">
    </a-plane>

  </a-entity>

</a-scene>

<script>
const video = document.querySelector('#video');
const videoPlane = document.querySelector('#videoPlane');
const playButton = document.querySelector('#playButton');
const model = document.querySelector('a-gltf-model');

playButton.addEventListener('click', function () {
  console.log("Play button clicked");

  // Hide 3D model
  model.setAttribute('visible', false);

  // Show video
  videoPlane.setAttribute('visible', true);

  // Play video (muted to allow mobile autoplay)
  video.muted = true;
  video.play().then(() => {
    console.log("Video playing");
  }).catch(err => {
    console.log("Error:", err);
  });
});
</script>

</body>
</html>
