<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>KPSTI AR Model</title>

  <!-- A-Frame -->
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>

  <!-- MindAR Image Tracking -->
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      width: 100%;
      height: 100%;
    }
    a-scene {
      width: 100%;
      height: 100%;
      position: fixed;
      top: 0;
      left: 0;
    }
  </style>
</head>

<body>
  <a-scene
    mindar-image="imageTargetSrc: targets/targets.mind;"
    color-space="sRGB"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false">

    <!-- Camera -->
    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <!-- Preload 3D Model -->
    <a-assets>
      <a-asset-item id="model" src="models/model.glb"></a-asset-item>
    </a-assets>

    <!-- Marker Entity -->
    <a-entity mindar-image-target="targetIndex: 0" mindar-stable="true">

      <!-- 3D Model -->
      <a-gltf-model 
        src="#model" 
        position="0 0 -0.5" 
        scale="0.5 0.5 0.5"
        animation="property: rotation; to: 0 360 0; loop: true; dur: 8000">
      </a-gltf-model>

      <!-- Text Label -->
      <a-text value="KPSTI Info" position="0 0.5 0" align="center" color="#ffffff"></a-text>

    </a-entity>

  </a-scene>
</body>
</html>
