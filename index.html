<a-scene
  mindar-image="imageTargetSrc: targets/targets.mind;"
  color-space="sRGB"
  vr-mode-ui="enabled: false"
  device-orientation-permission-ui="enabled: false">

  <a-assets>
    <a-asset-item id="model" src="models/model.glb"></a-asset-item>
  </a-assets>

  <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

  <a-entity mindar-image-target="targetIndex: 0" mindar-stable="true">

    <!-- Red Box for debug -->
    <a-box color="red" position="0 0 0" scale="0.2 0.2 0.2"></a-box>

    <!-- 3D Model -->
    <a-gltf-model 
      src="#model" 
      position="0 0 -0.5" 
      scale="0.5 0.5 0.5"
      animation="property: rotation; to: 0 360 0; loop: true; dur: 8000">
    </a-gltf-model>

    <!-- Text Label -->
    <a-text value="KPSTI Info" position="0 0.5 0" align="center" color="#ffffff"></a-text>

  </a-entity>
</a-scene>
