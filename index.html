<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>KPSTI AR Test - A4 Marker</title>

  <!-- A-Frame -->
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>

  <!-- MindAR Image Tracking -->
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
</head>

<body style="margin:0; overflow:hidden;">

  <a-scene
    mindar-image="imageTargetSrc: targets/targets.mind;"
    embedded
    color-space="sRGB"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false">

    <!-- Camera -->
    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <!-- Image Target #0 (A4 Marker) -->
    <a-entity mindar-image-target="targetIndex: 0" mindar-stable="true">

      <!-- Red Box Debug -->
      <a-box color="red" position="0 0 0" scale="0.2 0.2 0.2"></a-box>

      <!-- Small 3D Cube (placeholder for your model) -->
      <a-box color="blue" position="0 0 0.2" scale="0.1 0.1 0.1"
             animation="property: rotation; to: 0 360 0; loop: true; dur: 5000">
      </a-box>

      <!-- Text Label -->
      <a-text value="KPSTI Info" position="0 0.5 0" align="center" color="#ffffff"></a-text>

    </a-entity>

  </a-scene>

</body>
</html>
